<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Compare Slider</title>
  <!-- CRITICAL: Telegram script FIRST, before everything else -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Upload UI (shown when no images loaded yet) -->
  <div class="upload-screen" id="uploadScreen">
    <div class="upload-card">
      <h2 class="upload-title">Сравнение изображений</h2>
      <p class="upload-hint">Загрузите два фото для сравнения</p>
      <div class="upload-slots">
        <label class="upload-slot" id="slotBefore">
          <input type="file" accept="image/*" id="fileBefore">
          <div class="slot-preview" id="previewBefore">
            <span class="slot-icon">+</span>
            <span class="slot-label">До</span>
          </div>
        </label>
        <label class="upload-slot" id="slotAfter">
          <input type="file" accept="image/*" id="fileAfter">
          <div class="slot-preview" id="previewAfter">
            <span class="slot-icon">+</span>
            <span class="slot-label">После</span>
          </div>
        </label>
      </div>
      <button class="start-btn" id="startBtn" disabled>Сравнить</button>
    </div>
  </div>

  <!-- Slider (hidden until both images loaded) -->
  <div class="slider-container" id="sliderContainer" style="display:none">
    <div class="slider-card" id="sliderCard">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
      </div>
      <div class="slider-wrapper" id="sliderWrapper">
        <!-- After image (bottom layer, full width) -->
        <div class="image-after">
          <img alt="After" draggable="false" id="imgAfter">
        </div>
        <!-- Before image (top layer, clipped by width) -->
        <div class="image-before" id="imageBefore">
          <img alt="Before" draggable="false" id="imgBefore">
        </div>
        <!-- Divider line + handle -->
        <div class="divider" id="divider">
          <div class="divider-line"></div>
          <div class="divider-handle">
            <span class="handle-arrow left">&#9664;</span>
            <span class="handle-arrow right">&#9654;</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Back button — outside .slider-card, inside .slider-container -->
    <button class="back-btn" id="backBtn" title="Загрузить другие фото">&#8592;</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
